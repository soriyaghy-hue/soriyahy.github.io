.container{max-width:680px;margin:0 auto;padding:0 1.25rem 5rem}

let currentQuiz=null,currentQ=0,scores={};
function goHome(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('home').classList.add('active');}
function startQuiz(id){currentQuiz=QUIZZES.find(q=>q.id===id);currentQ=0;scores={};document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('quiz').classList.add('active');renderQ();}
function renderQ(){
  const q=currentQuiz.questions[currentQ];const total=currentQuiz.questions.length;
  document.getElementById('prog').style.width=((currentQ/total)*100)+'%';
  document.getElementById('q-counter').textContent=(currentQ+1)+' / '+total;
  document.getElementById('q-text').textContent=q.text;
  const opts=document.getElementById('options');opts.innerHTML='';
  shuffle(q.opts).forEach(([label,key])=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=label;b.onclick=()=>{scores[key]=(scores[key]||0)+1;currentQ++;currentQ<currentQuiz.questions.length?renderQ():showResult();};opts.appendChild(b);});
}
function getJellycatResult(){
  const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const pool=currentQuiz.resultMap[top]||currentQuiz.resultMap['cozy'];
  const name=pool[Math.floor(Math.random()*pool.length)];
  return{name,...currentQuiz.results[name]};
}
function showResult(){
  document.getElementById('prog').style.width='100%';
  let r,name;
  if(currentQuiz.id==='jellycat'){const res=getJellycatResult();r=res;name=res.name;}
  else{name=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];r=currentQuiz.results[name];}
  document.getElementById('r-emoji').textContent=r.emoji;
  document.getElementById('r-title').textContent=name;
  document.getElementById('r-desc').textContent=r.desc;
  document.getElementById('r-traits').innerHTML=r.traits.map(t=>`<span class="trait">${t}</span>`).join('');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('result').classList.add('active');
}
function retakeQuiz(){startQuiz(currentQuiz.id);}
const grid=document.getElementById('quiz-grid');
QUIZZES.forEach(q=>{const card=document.createElement('div');card.className='quiz-card';card.innerHTML=`<div class="card-icon">${q.emoji}</div><div class="card-info"><div class="card-title">${q.title}</div><div class="card-desc">${q.desc}</div></div><div class="card-arrow">→</div>`;card.onclick=()=>startQuiz(q.id);grid.appendChild(card);});
const bowsContainer=document.getElementById('bows-bg');
const bowEmojis=['🎀','🌸','✨','🌷','💕'];
for(let i=0;i<14;i++){const b=document.createElement('div');b.className='bow';b.textContent=bowEmojis[i%bowEmojis.length];b.style.left=(Math.random()*100)+'%';b.style.top=(Math.random()*100)+'%';b.style.animationDelay=(Math.random()*8)+'s';b.style.animationDuration=(8+Math.random()*8)+'s';b.style.fontSize=(18+Math.random()*24)+'px';bowsContainer.appendChild(b);}
